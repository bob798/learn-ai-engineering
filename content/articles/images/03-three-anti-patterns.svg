<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540">
  <defs>
    <style>
      .bg { fill: #FAFAF7; }
      .h { font: 600 22px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif; fill: #1A1A1A; }
      .num { font: 700 28px ui-monospace, "SF Mono", Menlo, monospace; fill: #C0392B; }
      .num-mid { font: 700 28px ui-monospace, "SF Mono", Menlo, monospace; fill: #FAFAF7; }
      .name { font: 600 22px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif; fill: #1A1A1A; }
      .name-mid { font: 600 22px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif; fill: #FAFAF7; }
      .en { font: 400 13px ui-monospace, "SF Mono", Menlo, monospace; fill: #6B6B6B; }
      .en-mid { font: 400 13px ui-monospace, "SF Mono", Menlo, monospace; fill: #FBE4DC; }
      .label { font: 600 13px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif; fill: #6B6B6B; letter-spacing: 2px; }
      .label-mid { font: 600 13px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif; fill: #FBE4DC; letter-spacing: 2px; }
      .body { font: 400 14px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif; fill: #1A1A1A; }
      .body-mid { font: 400 14px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif; fill: #FAFAF7; }
      .star { font: 700 18px sans-serif; fill: #FBE4DC; }
      .card { fill: #FFFFFF; stroke: #D9D9D6; stroke-width: 1; }
      .card-hot { fill: #C0392B; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="540"/>

  <text class="h" x="60" y="50">三个底层反模式</text>

  <!-- Card 1 -->
  <g transform="translate(60, 90)">
    <rect class="card" width="340" height="410" rx="10"/>
    <text class="num" x="30" y="60">01</text>
    <text class="name" x="30" y="100">完整性偏好</text>
    <text class="en" x="30" y="122">Verbosity Default</text>
    <line x1="30" y1="148" x2="310" y2="148" stroke="#D9D9D6"/>

    <text class="label" x="30" y="180">现象</text>
    <text class="body" x="30" y="208">把"状态清单"</text>
    <text class="body" x="30" y="230">当"操作手册"</text>

    <text class="label" x="30" y="275">根因</text>
    <text class="body" x="30" y="303">训练目标奖励</text>
    <text class="body" x="30" y="325">helpful + complete</text>

    <text class="label" x="30" y="370">信号</text>
    <text class="body" x="30" y="395">输出像 checklist</text>
  </g>

  <!-- Card 2 (HOT - middle) -->
  <g transform="translate(420, 80)">
    <rect class="card-hot" width="360" height="430" rx="10"/>
    <text class="star" x="320" y="35">⭐</text>
    <text class="num-mid" x="30" y="65">02</text>
    <text class="name-mid" x="30" y="105">规则衰减</text>
    <text class="en-mid" x="30" y="127">Rule Decay</text>
    <line x1="30" y1="153" x2="330" y2="153" stroke="#FBE4DC" stroke-opacity="0.4"/>

    <text class="label-mid" x="30" y="185">现象</text>
    <text class="body-mid" x="30" y="213">早期规则被后续</text>
    <text class="body-mid" x="30" y="235">指令悄悄冲掉</text>

    <text class="label-mid" x="30" y="280">根因</text>
    <text class="body-mid" x="30" y="308">无机制校验</text>
    <text class="body-mid" x="30" y="330">"是否违反约束"</text>

    <text class="label-mid" x="30" y="375">信号</text>
    <text class="body-mid" x="30" y="403">"这条我说过啊"</text>
  </g>

  <!-- Card 3 -->
  <g transform="translate(800, 90)">
    <rect class="card" width="340" height="410" rx="10"/>
    <text class="num" x="30" y="60">03</text>
    <text class="name" x="30" y="100">领域 default 盲区</text>
    <text class="en" x="30" y="122">Domain Default Gap</text>
    <line x1="30" y1="148" x2="310" y2="148" stroke="#D9D9D6"/>

    <text class="label" x="30" y="180">现象</text>
    <text class="body" x="30" y="208">行业常识不懂，</text>
    <text class="body" x="30" y="230">又不主动问</text>

    <text class="label" x="30" y="275">根因</text>
    <text class="body" x="30" y="303">know-how 是暗知识</text>
    <text class="body" x="30" y="325">AI 不知道自己不知道</text>

    <text class="label" x="30" y="370">信号</text>
    <text class="body" x="30" y="395">"这难道不是常识？"</text>
  </g>
</svg>
